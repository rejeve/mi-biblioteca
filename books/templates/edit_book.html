<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 32px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.09);
        }

        h1 {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 24px;
        }

        p { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243,156,18,0.15);
        }

        select[multiple] {
            height: 130px;
            padding: 8px;
        }

        select[multiple] option {
            padding: 5px 8px;
            border-radius: 4px;
        }

        select[multiple] option:checked {
            background: #1a8a6e;
            color: white;
        }

        .hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }

        ul.errorlist {
            list-style: none;
            background: #fdecea;
            border-left: 3px solid #e74c3c;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #c0392b;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-guardar {
            background: #f39c12;
            color: white;
            padding: 11px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-guardar:hover { background: #d68910; }

        .btn-cancelar {
            background: #ecf0f1;
            color: #555;
            padding: 11px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .btn-cancelar:hover { background: #dde1e4; }
    </style>
</head>
<body>

    <a href="{% url 'edit_book_clase' book.id %}" >Ir a la vista por clase</a>

<div class="container">

    <h1>✏️ Editar Libro</h1>

    <form action="{% url 'edit_book' book.id %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-group">
            <button type="submit" class="btn-guardar">💾 Guardar cambios</button>
            <a href="{% url 'list_books' %}" class="btn-cancelar">✕ Cancelar</a>
        </div>
    </form>

</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
    new TomSelect(".tomselect", {
        plugins: ['remove_button'],
    });
});
</script>
</body>
</html>
