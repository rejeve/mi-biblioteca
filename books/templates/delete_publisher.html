<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Editorial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 32px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.09);
            text-align: center;
        }

        .icono {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .advertencia {
            color: #777;
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .nombre-editorial {
            font-weight: 700;
            color: #e74c3c;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-confirmar {
            background: #e74c3c;
            color: white;
            padding: 11px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-confirmar:hover { background: #c0392b; }

        .btn-cancelar {
            background: #ecf0f1;
            color: #555;
            padding: 11px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .btn-cancelar:hover { background: #dde1e4; }
    </style>
</head>
<body>
<div class="container">

    <div class="icono">🗑️</div>
    <h1>¿Eliminar editorial?</h1>
    <p class="advertencia">
        Estás a punto de eliminar <span class="nombre-editorial">{{ publisher.name }}</span>. 
        Esta acción no se puede deshacer.
    </p>

    <form action="{% url 'delete_publisher' publisher.id %}" method="post">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit" class="btn-confirmar">🗑️ Sí, eliminar</button>
            <a href="{% url 'list_publisher' %}" class="btn-cancelar">✕ Cancelar</a>
        </div>
    </form>

</div>
</body>
</html>
